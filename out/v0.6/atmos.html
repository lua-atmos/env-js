<!DOCTYPE html>
<html>
<head><title>Atmos</title></head>
<body>
    <span id="status"></span>
    <pre id="output"></pre>

    <script type="text/lua" data-module="streams" src="https://raw.githubusercontent.com/lua-atmos/f-streams/v0.2/streams/init.lua"></script>
    <script type="text/lua" data-module="atmos" src="https://raw.githubusercontent.com/lua-atmos/atmos/v0.6/atmos/init.lua"></script>
    <script type="text/lua" data-module="atmos.util" src="https://raw.githubusercontent.com/lua-atmos/atmos/v0.6/atmos/util.lua"></script>
    <script type="text/lua" data-module="atmos.run" src="https://raw.githubusercontent.com/lua-atmos/atmos/v0.6/atmos/run.lua"></script>
    <script type="text/lua" data-module="atmos.streams" src="https://raw.githubusercontent.com/lua-atmos/atmos/v0.6/atmos/streams.lua"></script>
    <script type="text/lua" data-module="atmos.x" src="https://raw.githubusercontent.com/lua-atmos/atmos/v0.6/atmos/x.lua"></script>
    <script type="text/lua" data-module="atmos.env.js" src="https://raw.githubusercontent.com/lua-atmos/env-js/v0.1/init.lua"></script>
    <script type="text/lua" data-module="atmos.lang.global" src="https://raw.githubusercontent.com/atmos-lang/atmos/v0.6/src/global.lua"></script>
    <script type="text/lua" data-module="atmos.lang.aux" src="https://raw.githubusercontent.com/atmos-lang/atmos/v0.6/src/aux.lua"></script>
    <script type="text/lua" data-module="atmos.lang.lexer" src="https://raw.githubusercontent.com/atmos-lang/atmos/v0.6/src/lexer.lua"></script>
    <script type="text/lua" data-module="atmos.lang.parser" src="https://raw.githubusercontent.com/atmos-lang/atmos/v0.6/src/parser.lua"></script>
    <script type="text/lua" data-module="atmos.lang.prim" src="https://raw.githubusercontent.com/atmos-lang/atmos/v0.6/src/prim.lua"></script>
    <script type="text/lua" data-module="atmos.lang.coder" src="https://raw.githubusercontent.com/atmos-lang/atmos/v0.6/src/coder.lua"></script>
    <script type="text/lua" data-module="atmos.lang.tosource" src="https://raw.githubusercontent.com/atmos-lang/atmos/v0.6/src/tosource.lua"></script>
    <script type="text/lua" data-module="atmos.lang.exec" src="https://raw.githubusercontent.com/atmos-lang/atmos/v0.6/src/exec.lua"></script>
    <script type="text/lua" data-module="atmos.lang.run" src="https://raw.githubusercontent.com/atmos-lang/atmos/v0.6/src/run.lua"></script>

    <script type="module">
// lua-atmos v0.6
// run.js — shared utilities for all three tiers
// Never used standalone; concatenated with a tier file by build.sh

import { LuaFactory } from
    'https://cdn.jsdelivr.net/npm/wasmoon@1.16.0/+esm';

const output = document.getElementById('output');
const status = document.getElementById('status');

function getCode () {
    const hash = location.hash.slice(1);
    if (!hash) {
        status.textContent = 'No program in URL.';
        return null;
    }
    return atob(hash);
}

async function createEngine () {
    const factory = new LuaFactory();
    const lua = await factory.createEngine();
    lua.global.set('print', (...args) => {
        output.textContent += args.join('\t') + '\n';
    });
    return lua;
}

async function preloadModules (lua) {
    const tags = document.querySelectorAll(
        'script[type="text/lua"]'
    );
    for (const el of tags) {
        const src = el.getAttribute('src');
        const text = src
            ? await fetch(src).then(r => r.text())
            : el.textContent;
        lua.global.set('JS_mod_name', el.dataset.module);
        lua.global.set('JS_mod_src',  text);
        await lua.doString(
            'package.preload[JS_mod_name]'
            + ' = assert(load(JS_mod_src,'
            + ' "@" .. JS_mod_name))'
        );
    }
}

function startLoop (lua) {
    let emitting = false;
    const interval = setInterval(() => {
        if (emitting) return;
        emitting = true;
        try {
            const now = Date.now();
            lua.doString(
                `local E = JS_env`
                + `\nlocal dt = ${now} - E.now`
                + `\nif dt > 0 then`
                + `\n    E.now = ${now}`
                + `\n    emit('clock', dt, ${now})`
                + `\nend`
            );
            if (lua.global.get('JS_done')) {
                clearInterval(interval);
                lua.doString('stop()');
                status.textContent = 'Done.';
            }
        } finally {
            emitting = false;
        }
    }, 16);
    return interval;
}
// atmos.js — compile .atm source, then run under atmos runtime

(async () => {
    const code = getCode();
    if (!code) return;

    status.textContent = 'Loading...';
    const lua = await createEngine();
    await preloadModules(lua);
    lua.global.set('JS_now', () => Date.now());

    let interval;
    lua.global.set('JS_close', () => clearInterval(interval));

    status.textContent = 'Compiling...';
    try {
        await lua.doString(
            'atmos = require "atmos"\n'
            + 'X = require "atmos.x"\n'
            + 'require "atmos.lang.exec"\n'
            + 'require "atmos.lang.run"'
        );

        const wrapped =
            '(func (...) { ' + code + '\n})(...)';
        lua.global.set('JS_src', wrapped);
        lua.global.set('JS_file', 'input.atm');

        status.textContent = 'Running...';
        await lua.doString(
            'JS_env = require("atmos.env.js")\n'
            + 'local f, err = '
            + 'atm_loadstring(JS_src, JS_file)\n'
            + 'if not f then error(err) end\n'
            + 'start(function()\n'
            + '    f()\n'
            + '    JS_done = true\n'
            + 'end)'
        );
        interval = startLoop(lua);
    } catch (e) {
        output.textContent += 'ERROR: ' + e.message + '\n';
        status.textContent = 'Error.';
    }
})();

    </script>
</body>
</html>
